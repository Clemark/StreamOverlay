<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Countdown</title>

    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Hegarty&display=block"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-wrapper">
      <div><p class="intro">STREAM STARTING</p></div>
      <div class="timer-wrapper">
        <div class="timer">
          <div class="scroll-wrap">
            <div class="scroll-inner" id="m1"></div>
          </div>
          <div class="scroll-wrap">
            <div class="scroll-inner" id="m2"></div>
          </div>
          <div>:</div>
          <div class="scroll-wrap">
            <div class="scroll-inner" id="s1"></div>
          </div>
          <div class="scroll-wrap">
            <div class="scroll-inner" id="s2"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
